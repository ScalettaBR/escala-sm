<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escalas | Escala São Miguel</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/escalas.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="topbar">

    <h1>Escala Mensal</h1>

    <div class="actions">

        <input type="month" id="mes">

        <button id="btnGerar">
            <i class="fa-solid fa-calendar-plus"></i>
            Gerar
        </button>

        <button id="btnSalvar">
            <i class="fa-solid fa-floppy-disk"></i>
            Salvar
        </button>

        <button id="btnPDF" class="btn btn-danger">

    <i class="fa-solid fa-file-pdf"></i>

    Exportar PDF

</button>

    </div>

</div>

<div class="tabela-container">

    <table id="tabelaEscala">

        <thead id="thead">

        </thead>

        <tbody id="tbody">

        </tbody>

    </table>

</div>

<!-- MENU DE ALTERAÇÃO -->

<div id="menuCelula" class="menu hidden">

    <button data-value="X">Trabalha</button>
    <button data-value="F">Folga</button>
    <button data-value="FE">Férias</button>
    <button data-value="A">Afastamento</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>

<script type="module" src="../js/escalas.js"></script>

</body>

</html>
