<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Funcionários | Escala São Miguel</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/funcionarios.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <header>

        <h1>Funcionários</h1>

        <button id="btnNovo">
            <i class="fa-solid fa-plus"></i>
            Novo Funcionário
        </button>

    </header>

    <div class="filtros">

        <input type="text" id="busca" placeholder="Buscar funcionário...">

    </div>

    <table class="table">

        <thead>

            <tr>

                <th>Nome</th>
                <th>Matrícula</th>
                <th>Função</th>
                <th>Turno</th>
                <th>Status</th>
                <th>Ações</th>

            </tr>

        </thead>

        <tbody id="listaFuncionarios">

        </tbody>

    </table>

</div>

<!-- MODAL -->

<div class="modal hidden" id="modal">

    <div class="modal-content">

        <h2>Funcionário</h2>

        <input type="hidden" id="id">

        <input type="text" id="nome" placeholder="Nome">

        <input type="text" id="matricula" placeholder="Matrícula">

        <input type="text" id="funcao" placeholder="Função">

        <select id="turno">

            <option value="Manhã">Manhã</option>
            <option value="Noite">Noite</option>

        </select>

        <select id="status">

            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>

        </select>

        <div class="modal-actions">

            <button id="btnSalvar">Salvar</button>
            <button id="btnCancelar">Cancelar</button>

        </div>

    </div>

</div>

<script type="module" src="../js/funcionarios.js"></script>

</body>

</html>
